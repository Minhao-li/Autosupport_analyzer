<!doctype html>
<html><head><meta charset="utf-8"><style>
body{font:13px system-ui,sans-serif;width:360px;padding:14px;margin:0;background:#0f1320;color:#e6ecf3}
h3{margin:0 0 10px;font-size:14px;color:#00e0ff}
.row{margin:6px 0;line-height:1.5}
.muted{color:#8895a8}.ok{color:#4ade80;font-weight:600}.err{color:#f87171;font-weight:600}
code{background:#1a2030;padding:1px 5px;border-radius:3px;word-break:break-all;font-size:11px}
hr{border:none;border-top:1px solid #2a3142;margin:12px 0}
label{display:block;color:#8895a8;font-size:11px;margin:8px 0 2px}
input{width:100%;box-sizing:border-box;background:#1a2030;border:1px solid #2a3142;color:#e6ecf3;border-radius:4px;padding:5px}
button{margin:10px 6px 0 0;padding:5px 11px;cursor:pointer;background:#1f6feb;color:#fff;border:none;border-radius:4px}
button.alt{background:#2a3142}
button.x{background:#3a2030;padding:4px 8px;margin:0}
#msg{color:#4ade80;font-size:11px;margin-top:8px;min-height:14px}
.server{border:1px solid #2a3142;border-radius:6px;padding:8px;margin:8px 0;background:#141a2a}
.server .hd{display:flex;justify-content:space-between;align-items:center}
.server .hd .muted{font-size:11px}
.results{margin:4px 0 0;font-size:11px}
.results div{margin:2px 0;word-break:break-all}
</style></head><body>
<h3>&#9889; AIQ Token Capture</h3>
<div id="status" class="row">Loading&#8230;</div>
<div id="tok" class="row"></div>
<div>
  <button id="copy" class="alt">Copy token</button>
  <button id="resend" class="alt">Re-send</button>
</div>
<hr>
<div class="muted" style="font-size:11px">Sign in at <code>aiq.netapp.com</code>. Any authenticated AIQ request auto-captures the token and posts it to every server below.</div>
<label>Autosupport Analyzer servers</label>
<div id="servers"></div>
<button id="add" class="alt">+ Add server</button>
<button id="save">Save settings</button>
<div id="msg"></div>
<script src="config.js"></script>
<script src="popup.js"></script>
</body></html>
